name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Lint Check
      run: npm run lint || echo "No lint configured"

    - name: Build React App
      run: npm run build

    - name: Build Docker Image
      run: docker build -t zomato-devops .

    - name: Run Trivy Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: zomato-devops
        format: 'table'
        exit-code: '1' # This will fail the build if vulnerabilities are found
        ignore-unfixed: true
        severity: 'CRITICAL,HIGH'

    - name: Run Container (Test Deployment)
      run: docker run -d -p 3000:3000 zomato-devops